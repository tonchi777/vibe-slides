<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rep. Antonio Tinio | Vibe Slides Library</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,700&display=swap">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --accent: #ff3e3e;
            --text-main: #ffffff;
            --text-muted: #a1a1a1;
            --font-display: 'Clash Display', sans-serif;
            --font-body: 'Satoshi', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: clamp(2rem, 10vw, 6rem) 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2rem;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 4rem);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .presentation-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .presentation-item {
            background: var(--surface);
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-left: 0px solid var(--accent);
        }

        .presentation-item:hover {
            transform: translateX(10px);
            border-left-width: 8px;
            background: #1a1a1a;
        }

        .info h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .info .date {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .arrow {
            font-size: 2rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }

        .presentation-item:hover .arrow {
            transform: translateX(5px);
        }

        footer {
            margin-top: 6rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .presentation-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .arrow { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="subtitle">Vibe Slides Library</p>
            <h1>Rep. Antonio Tinio</h1>
            <p style="color: var(--text-muted);">Legislative briefings and research presented with high-impact aesthetics.</p>
        </header>

        <div class="presentation-list">
            <!-- ITEM START -->
            <a href="act-teachers-speech-mar4.html" class="presentation-item">
                <div class="info">
                    <h2>Tumitinding Pagtutol sa Giyera ng US</h2>
                    <span class="date">March 10, 2026</span>
                </div>
                <div class="arrow">→</div>
            </a>
            <!-- ITEM END -->
            <!-- ITEM START -->
            <a href="lgu-pork-presentation.html" class="presentation-item">
                <div class="info">
                    <h2>Marcos’ “LGU Pork” Exposure</h2>
                    <span class="date">February 28, 2026</span>
                </div>
                <div class="arrow">→</div>
            </a>
            <!-- ITEM END -->
        </div>

        <footer>
            &copy; 2026 Rep. Antonio Tinio | Generated by Nina
        </footer>
    </div>
</body>
</html>
